apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo.nginx-kustomize-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: nginx
    environment: dev
    tool: kustomize
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo
  source:
    repoURL: https://github.com/deegupt4/k8s-manage-app
    targetRevision: main
    path: argocd-demo/kustomize/overlays/dev
  destination:
    name: kty-dev-01
    namespace: nginx-kustomize-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
