apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-kustomize-dev

resources:
  - ../../base

# Override replica count
replicas:
  - name: nginx
    count: 1

# Patch the ConfigMap content for dev
patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: nginx-index
      data:
        index.html: <h1>Hello from Kustomize - DEV</h1>
