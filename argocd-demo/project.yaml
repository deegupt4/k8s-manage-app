apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Standalone demo project — nginx on dev + prod
  sourceRepos:
    - ghcr.io/stefanprodan/charts
    - https://github.com/deegupt4/k8s-manage-app
  destinations:
    - name: kty-dev-01
      namespace: nginx-dev
    - name: kty-prd-01
    
      namespace: nginx-prod
    - name: kty-dev-01
      namespace: nginx-kustomize-dev
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  roles:
    - name: demo-viewer
      description: Can view and manually sync demo apps
      policies:
        - p, proj:demo:demo-viewer, applications, get, demo/*, allow
        - p, proj:demo:demo-viewer, applications, sync, demo/*, allow
