# Replica shard — handles all reads, scales independently of primary
redis:
  architecture: replication

  master:
    count: 1
    persistence:
      enabled: true
      size: 8Gi

  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
