apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  scopes: '[groups, email]'
  policy.csv: |
    # Platform admins — full access
    g, platform-team, role:admin
    # Developers — can sync their own apps, read-only everything else
    p, role:developer, applications, sync, *, allow
    p, role:developer, applications, get, *, allow
